<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>கற்கை | Percentage — Basic &amp; Advanced</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@600;700&family=Merriweather:wght@700;900&family=Inter:wght@500;600;700&display=swap');

  :root{
    --brown-deep:#3F2404;
    --brown:#633806;
    --gold:#BA7517;
    --cream:#FAEEDA;
    --orange:#D85A30;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; height:100%; background:var(--brown-deep); font-family:'Inter',sans-serif; }

  /* persistent karkai header, shown above both Basic and Advanced tabs */
  .karkai-header{
    background:var(--brown-deep);
    color:var(--cream);
    text-align:center;
    padding:1.1rem 1rem 1rem;
    border-bottom:4px solid var(--gold);
  }
  .karkai-header h1{
    font-family:'Merriweather',serif;
    font-weight:900;
    font-size:2.1rem;
    margin:0;
    color:var(--white);
  }
  .karkai-header .en-sub{
    font-family:'Inter',sans-serif;
    font-weight:600;
    color:var(--gold);
    font-size:1.05rem;
    margin-top:0.25rem;
  }

  /* main-level tab bar: Basic / Advanced */
  nav.main-tabs{
    display:flex;
    justify-content:center;
    gap:0.7rem;
    background:var(--brown);
    padding:0.7rem 1rem;
  }
  nav.main-tabs button{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:1rem;
    padding:0.6rem 2rem;
    border-radius:999px;
    border:2px solid var(--gold);
    background:transparent;
    color:var(--cream);
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  nav.main-tabs button.active{
    background:var(--orange);
    border-color:var(--orange);
    color:var(--white);
  }
  nav.main-tabs button:hover:not(.active){
    background:rgba(255,255,255,0.08);
  }

  .tab-panel{ display:none; height:calc(100vh - 128px); }
  .tab-panel.active{ display:block; }

  iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
    background:var(--white);
  }

  @media(max-width:600px){
    .karkai-header h1{ font-size:1.6rem; }
    nav.main-tabs button{ padding:0.5rem 1.2rem; font-size:0.9rem; }
  }
</style>
</head>
<body>

<div class="karkai-header">
  <h1>கற்கை</h1>
  <div class="en-sub">KARKAI &nbsp;·&nbsp; Percentage Learning Hub</div>
</div>

<nav class="main-tabs">
  <button id="tab-basic" class="active" onclick="showTab('basic')">Basic</button>
  <button id="tab-advanced" onclick="showTab('advanced')">Advanced</button>
</nav>

<div id="panel-basic" class="tab-panel active">
  <iframe src="basic.html" title="Basic Percentage Lesson"></iframe>
</div>

<div id="panel-advanced" class="tab-panel">
  <iframe src="advanced.html" title="Advanced Percentage Lesson"></iframe>
</div>

<script>
function showTab(which){
  document.getElementById('tab-basic').classList.toggle('active', which==='basic');
  document.getElementById('tab-advanced').classList.toggle('active', which==='advanced');
  document.getElementById('panel-basic').classList.toggle('active', which==='basic');
  document.getElementById('panel-advanced').classList.toggle('active', which==='advanced');
}
</script>

</body>
</html>
